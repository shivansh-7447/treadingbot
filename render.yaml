# Match these in the Render dashboard (if you are not using Blueprint):
#   Build: npm run render:build
#   Start: npm start   ← NOT node bot.js (no web server)
#
# sqlite3 prebuilds can need newer glibc than Render → GLIBC_2.38 errors. render:build
# compiles sqlite3 on Render so the binary matches their OS.
#
# "invalid ELF header" = node_modules pushed from Windows — remove from git.

services:
  - type: web
    name: crypto-ai-bot
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/auth/status
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
