# Render dashboard (manual Web Service) — TWO different fields:
#   Build Command:  npm run build     ← installs deps + compiles sqlite3 (NEVER use npm start here)
#   Start Command:  npm start         ← runs the server (NOT node bot.js)
#
# If Build is set to npm start, express will be missing — start is not a build step.
#
# "invalid ELF header" = node_modules pushed from Windows — remove from git.

services:
  - type: web
    name: crypto-ai-bot
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/auth/status
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
